# Config nginx per il servizio "web" del docker-compose: serve la build statica
# della Angular PWA e fa reverse-proxy di /api verso backend-api (Spring Boot).
# Montata come volume sovrascrivendo /etc/nginx/conf.d/default.conf dell'immagine
# nginx:alpine costruita da apps/web/Dockerfile (che gia' contiene solo i file statici).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular routing lato client: qualunque path non-file ricade su index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy verso il backend Spring Boot (servizio "backend-api" in docker-compose).
    location /api/ {
        proxy_pass http://backend-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket STOMP (try-on status updates).
    location /ws/ {
        proxy_pass http://backend-api:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
