version: "3.9"

# Orchestrazione completa Reflct (Concept Document v4.0, sez. 4.2). Uso:
#   cd infra && cp .env.example .env && docker compose up --build
# NON eseguito/verificato in questo ambiente: Docker non e' disponibile qui
# (vedi README). Il file e' scritto e validato solo sintatticamente.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reflct}
      POSTGRES_USER: ${POSTGRES_USER:-reflct}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reflct}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reflct}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-reflct}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-reflct12345}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  ai-service:
    build:
      context: ../backend/ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8001}:8001"

  scraping-service:
    build:
      context: ../backend/scraping-service
    restart: unless-stopped
    ports:
      - "${SCRAPING_SERVICE_PORT:-8002}:8002"

  backend-api:
    build:
      context: ../backend/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-reflct}
      DB_USER: ${POSTGRES_USER:-reflct}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-reflct}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-in-production-0123456789}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      AI_SERVICE_BASE_URL: http://ai-service:8001
      SCRAPING_SERVICE_BASE_URL: http://scraping-service:8002
    ports:
      - "${API_PORT:-8090}:8080"

  web:
    build:
      context: ../apps/web
    restart: unless-stopped
    depends_on:
      - backend-api
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  minio-data:
