spring:
  application:
    name: reflct-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reflct}
    username: ${DB_USER:reflct}
    password: ${DB_PASSWORD:reflct}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

reflct:
  security:
    jwt:
      secret: ${JWT_SECRET:reflct-dev-secret-change-me-in-production-please-0123456789}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8001}
  scraping-service:
    base-url: ${SCRAPING_SERVICE_BASE_URL:http://localhost:8002}
  http-client:
    connect-timeout-ms: 3000
    read-timeout-ms: 10000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.reflct.api: INFO

---
# Profilo "dev": H2 in-memory, per lavorare in locale senza Docker/Postgres.
# Flyway e' disabilitato (le migration usano sintassi Postgres-specifica) a
# favore di ddl-auto:update, che genera lo schema da JPA direttamente su H2.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:reflct;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
